# Prometheus scrape config for the Morider services. Each service exposes
# /metrics via pkg/metrics (prometheus/client_golang). Grafana reads from here.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: morider-services
    static_configs:
      - targets:
          - "gateway:8080"
          - "auth:8081"
          - "user:8082"
          - "ride:8083"
          - "route:8084"
          - "reward:8085"
          - "telemetry:8086"
          - "feed:8087"
