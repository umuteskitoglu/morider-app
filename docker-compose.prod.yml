# Lean production stack for a small (~2 GB RAM) single host.
#
# Differences from the dev docker-compose.yml:
#   * One "app" container runs every service in a single Go process
#     (-service=all) instead of nine separate containers — one runtime and far
#     fewer Postgres connections.
#   * No Prometheus/Grafana and no Redis (Redis is unused by the Go code; the
#     LiveKit node here runs single-node, which doesn't need it).
#   * Postgres is tuned for low memory; every container has a hard mem_limit so
#     no single service can exhaust the box.
#   * Only the gateway port (8080) is published; the per-service ports stay
#     inside the container, reached by the gateway over localhost.
#
# Voice chat is opt-in via the "voice" profile (adds the LiveKit SFU).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   # with voice:
#   docker compose -f docker-compose.prod.yml --profile voice up -d --build

name: morider

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-morider}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-morider_secret}
      POSTGRES_DB: ${POSTGRES_DB:-morider}
    # Tuned for a small box: cap connections and buffers so Postgres stays well
    # under a few hundred MB. effective_cache_size is only a planner hint.
    command:
      - "postgres"
      - "-c"
      - "max_connections=40"
      - "-c"
      - "shared_buffers=96MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "max_wal_size=512MB"
      - "-c"
      - "min_wal_size=128MB"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-morider} -d ${POSTGRES_DB:-morider}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m
    shm_size: 128m

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    mem_limit: 64m

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["-service=all"]
    env_file: .env
    environment:
      APP_ENV: production
      # Cap the Go heap so the GC keeps RSS bounded; GOGC=50 trades a little CPU
      # for lower memory. Tune via .env if you have headroom.
      GOMEMLIMIT: ${GOMEMLIMIT:-512MiB}
      GOGC: ${GOGC:-50}
      # The all-in-one process opens one pool per service, so keep each tiny.
      DB_MAX_CONNS: ${DB_MAX_CONNS:-3}
      UPLOAD_DIR: /data/uploads
      # In all-in-one mode the gateway proxies to its siblings over localhost,
      # not the per-service container names used by the dev stack.
      AUTH_SERVICE_URL: http://localhost:8081
      USER_SERVICE_URL: http://localhost:8082
      RIDE_SERVICE_URL: http://localhost:8083
      ROUTE_SERVICE_URL: http://localhost:8084
      REWARD_SERVICE_URL: http://localhost:8085
      TELEMETRY_SERVICE_URL: http://localhost:8086
      FEED_SERVICE_URL: http://localhost:8087
      EVENT_SERVICE_URL: http://localhost:8088
    volumes:
      - uploads:/data/uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    mem_limit: 640m

  # Opt-in voice chat SFU (single-node, no Redis). Enable with --profile voice.
  # Behind strict mobile NAT you also need a TURN server — see docs/voice.md.
  livekit:
    image: livekit/livekit-server:v1.13
    profiles: ["voice"]
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./infra/livekit/livekit.prod.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret_change_me_in_production_32b}"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    restart: unless-stopped
    mem_limit: 256m

volumes:
  pgdata:
  uploads:
